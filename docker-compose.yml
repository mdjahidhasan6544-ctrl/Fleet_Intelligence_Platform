version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tracking_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: fleet_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking_user -d fleet_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  celery_worker:
    build: .
    command: celery -A fleet_project worker -l info
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
  celery_beat:
    build: .
    command: celery -A fleet_project beat -l info
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
